reboot:
  default-delay-seconds: 60
  min-delay-seconds: 5
  max-delay-seconds: 3600
  final-shutdown-delay-seconds: 3
  save-players: true
  save-worlds: true
  kick-players: true

  disable-plugins:
    enabled: false
    names:
      - CombatLogX

schedule:
  enabled: false
  timezone: "UTC"
  days:
    - MONDAY
    - TUESDAY
    - WEDNESDAY
    - THURSDAY
    - FRIDAY
    - SATURDAY
    - SUNDAY
  times:
    - "03:00"

countdown:
  warning-times:
    - 300
    - 120
    - 60
    - 30
    - 10
    - 5
    - 4
    - 3
    - 2
    - 1

  broadcast:
    enabled: true
    message: "&8[&eRestart&8] &7Server restart in &e{time}&7."

  title:
    enabled: true
    title: "&cRestarting Soon"
    subtitle: "&7Restart in &e{time}&7."
    fade-in: 0
    stay: 30
    fade-out: 10

  actionbar:
    enabled: true
    message: "&eRestart in &c{time} &8| &7Online: &f{online}"

  bossbar:
    enabled: true
    message: "&eServer restart in &c{time}"
    color: YELLOW
    style: SOLID

messages:
  prefix: "&8[&eLightReboot&8]&r "
  help-header: "&eLightReboot commands"
  no-permission: "&cYou do not have permission to use this."
  unknown-command: "&cUnknown command. Use &f/lightreboot help&c."
  delay-invalid: "&cInvalid time. Use seconds or shorthand like &f30s&c, &f5m&c, or &f1h&c."
  delay-out-of-range: "&cTime must be between &f{min}&c and &f{max}&c seconds."
  already-running: "&cA reboot is already running. Time left: &f{time}&c."
  not-running: "&cNo reboot countdown is active."
  reload-success: "&aConfiguration reloaded."
  reboot-started: "&eA server restart has been scheduled in &f{time}&e. Reason: &f{reason}&e."
  reboot-cancelled: "&cThe scheduled restart was cancelled by &f{player}&c."
  shutdown-started: "&cRestarting now. Saving server data..."
  status-idle: "&aNo reboot is running."
  status-running: "&eReboot running. Time left: &f{time}&e."
  status-scheduled: "&aScheduled reboots enabled: &f{count}&a time(s), timezone &f{timezone}&a."
  preview-header: "&aPreviewing reboot messages for &f{time}&a."
  kick-message: "&cServer restarting\n&7Please rejoin in a moment."
