name: LightReboot
version: '${project.version}'
main: org.flennn.lightreboot.LightReboot
api-version: '1.20'
author: flennn
softdepend: [PlaceholderAPI]
description: Safe configurable reboot countdowns for Paper servers

commands:
  lightreboot:
    description: Manage safe reboot countdowns
    usage: /<command> <start|cancel|status|preview|reload|help>
    aliases: [reboot, lreboot]

permissions:
  lightreboot.start:
    description: Start reboot countdowns
    default: op
  lightreboot.cancel:
    description: Cancel active reboot countdowns
    default: op
  lightreboot.status:
    description: View reboot status
    default: op
  lightreboot.preview:
    description: Preview countdown messages
    default: op
  lightreboot.reload:
    description: Reload LightReboot configuration
    default: op
  lightreboot.admin:
    description: Full access to LightReboot commands
    default: op
    children:
      lightreboot.start: true
      lightreboot.cancel: true
      lightreboot.status: true
      lightreboot.preview: true
      lightreboot.reload: true
